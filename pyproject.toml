[project]
name = "career-compass"
version = "0.1.0"
description = "职业规划前置工具：个人画像 × 外部趋势 → 可迭代、有证据、经得起压力测试的策略"
requires-python = ">=3.11"
dependencies = [
    "jinja2>=3.1.6",
    "pydantic>=2.13.4",
    "pyyaml>=6.0.3",
]

[project.scripts]
career-compass = "career_compass.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/career_compass"]

[tool.hatch.build.targets.sdist]
include = ["src", "playbooks", "templates", "SKILL.md"]
