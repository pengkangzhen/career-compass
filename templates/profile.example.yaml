# Profile —— 你的结构化画像（唯一事实源）。
# 改画像只改本文件，不要去改 strategy.md（那是推导结果）。
# 这是【示例】，请用自己的真实信息覆盖，删除注释提示。

name: "Alex（示例，请替换）"
current_role: "数据工程师"

# 教育背景：本 / 硕 / 博 分层填写。school = 院校全名；school_tier = 985/211/双一流/一本/二本/海外。
education:
  - level: bachelor
    degree: "学士"
    school: "某省立大学"
    school_tier: "一本"
    department: "数学学院"
    major: "信息与计算科学"
    start_year: 2015
    end_year: 2019
    status: graduated
    ranking_or_gpa: "专业前 15%"

  - level: master
    degree: "工学硕士"
    school: "某大学"
    school_tier: "211"
    department: "计算机学院"
    major: "计算机科学与技术"
    start_year: 2019
    end_year: 2021
    status: graduated
    ranking_or_gpa: "前 10%"

  # 无某层次学历可整段删除；博士在读示例：
  # - level: phd
  #   degree: "博士在读"
  #   school: "某大学"
  #   school_tier: "985"
  #   major: "管理科学与工程"
  #   start_year: 2024
  #   end_year: 2028
  #   status: enrolled
  #   thesis_or_focus: "供应链优化 × 多智能体"
