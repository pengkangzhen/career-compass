# Constraints —— 硬边界。分析阶段必须把这些当不可移动的墙，不能产出违反它们的方案。
#
# 北斗星只确定「做什么方向 × 什么性质雇主」，不决定「在哪个城市」。
# 就业地域(geo)/签证/户口属于具体择业考虑，已从引擎移除——见 docs/matching-engine.md。

family: null          # 家庭约束；没有写 null

financial_runway_months: 9

risk_appetite: medium
reversibility_bias: high

# Schema 2.2 —— 雇主性质偏好（与能力方向正交）
# 默认不预设：strong_preference=false 时全部雇主类型纳入矩阵，按 composite 自然排序。
# 用户看完机会矩阵后再回填强偏好做剔除，而非 intake 阶段预判。
employer_preference:
  include:
    - private
    - foreign
    - central_soe
    - local_soe
    - public_institution
    - civil_service
  exclude: []          # 明确不要的路径，如 ["civil_service"]
  priority:            # 越靠前越偏好（影响交叉矩阵排序与 composite 加权）
    - central_soe
    - private
  strong_preference: false   # true = 仅分析 include \ exclude，矩阵更窄

# 体制内路径 L5 门槛（可选）
public_sector_gates:
  accept_exam_prep_months: 12    # 愿意备考公务员/事业编的时间
  accept_non_research_roles: null
  party_member: null             # 党员身份（影响央企/事业编/公务员路径）
