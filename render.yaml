# Render Blueprint — 北斗星 SaaS 后端
# https://render.com/docs/blueprint-spec
# 部署步骤见 docs/deployment.md

services:
  - type: web
    name: beidou-api
    runtime: python
    plan: free  # 个人项目足够；用户量上来后升级 starter
    # API-only: frontend lives on Vercel; [gui] (pywebview) and SPA dist not needed.
    buildCommand: pip install -e ".[web]" && pip install "psycopg[binary]" alembic
    startCommand: alembic upgrade head && uvicorn career_compass.web.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Python 版本（render.yaml 不支持 pythonVersion 字段；走 PYTHON_VERSION 环境变量）
      - key: PYTHON_VERSION
        value: "3.11.11"
      # Postgres 连接串（来自 Neon）
      - key: DATABASE_URL
        sync: false  # 在 Render 控制台手动填，关联 Neon 数据库 URL
      # JWT 签名密钥；本地用 `openssl rand -hex 32` 生成后填入
      - key: SECRET_KEY
        sync: false
      # 腾讯云 CloudBase（默认 LLM 网关）。Base URL 可公开；API Key 走 sync:false 注入
      - key: CC_LLM_PROVIDER
        value: cloudbase
      - key: CC_LLM_MODEL
        value: hy3-preview
      - key: CC_CLOUDBASE_BASE_URL
        value: https://dev-d7gjfebo329689c3b.api.tcloudbasegateway.com/v1/ai/cloudbase
      - key: CC_CLOUDBASE_API_KEY
        sync: false
      # 可选备用 LLM key（控制台按需填）
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # 应用环境
      - key: ENV
        value: production
      # 让 web app 知道自己在生产模式（关闭 CORS dev origins）
      - key: CC_USERS_DATA_DIR
        value: /tmp/cc-users
      # Vercel 前端域名（B.3 拿到 URL 后回填，否则浏览器 CORS 拒绝）
      - key: CORS_ALLOW_ORIGINS
        sync: false
