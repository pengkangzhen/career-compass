# 目标行业池（用户调研）—— 宏观层面的候选赛道。
# 每个赛道两个关键字段：
#   value_is_in —— 真正值/护城河在哪（"深"的环节）
#   trap        —— 警惕停在"浅"的环节（热门赛道里浅层最易被替代/无壁垒）
# source 填的是检索到的报告/媒体名（URL 在 2-scan 阶段补进 signals 更规范）。

sectors:
  - name: "集成电路与半导体 / 芯片"
    why_hot: "国产替代 + 自主可控是长期国家战略，需求确定性强"
    value_is_in: "芯片设计 / 制造 / EDA / 封测 / 设备 / 材料等能工程化落地的硬环节"
    trap: "只会发论文，不能落地工程化"
    source: "用户调研（待补政策文件/行业报告）"
    fit_notes: ""

  - name: "人工智能与大模型"
    why_hot: "应用层爆发 + 基础设施投入持续加大"
    value_is_in: "懂训练（预训练 / 微调）/ 底层 infra / 推理优化 / 数据飞轮"
    trap: "只会调 API 做应用层 wrapper，无壁垒"
    source: "用户调研（待补）"
    fit_notes: ""

  - name: "新能源与储能 / 电池"
    why_hot: "双碳 + 电动车 + 电网储能三重拉动；但 2024-25 产能利用率 <50%，2026 政策'反内卷'去低端产能"
    value_is_in: "固态电池产业化（2026-27 关键节点）/ 硅基与金属锂负极 / 高压实铁锂 / 钠电池 / 上游锂资源与核心材料"
    trap: "低端电芯与组装环节严重产能过剩、内卷；只做系统集成而无材料/工艺壁垒"
    source: "东方财富《2026 锂电行业四大关注点》/ 新华网 2025-10 / 钛动力 CIBF 观察"
    fit_notes: ""

  - name: "生物医药与创新药研发"
    why_hot: "创新药出海多点开花 + ADC/双抗/CAR-T 前沿疗法 + AI 制药进入临床验证阶段"
    value_is_in: "源头创新 FIC/BIC、前沿疗法（ADC/双抗/CAR-T）、AI 制药全链（早期靶点发现 AI 渗透率 34%）、平台化能力与出海体系"
    trap: "me-too / 同质化管线、缺平台化能力的单点 Biotech、现金流转折风险"
    source: "《创新药产业链 2026 年度策略》/ 证券时报《AI 制药算力竞赛》/ 复宏汉霖专访"
    fit_notes: ""

  - name: "量子科技"
    why_hot: "2026 是技术密集突破之年，从实验验证走向工程化攻坚；本源量子等冲刺产业化"
    value_is_in: "硬件（量子比特 / 纠错 / 超导芯片中试线 / 整机）/ 全栈软件（CPU/GPU/QPU 编排与编译优化）/ 关键材料"
    trap: "商业化遥远（BCG 估 2040 年才规模化），在尚无真实商业落地时押注'量子应用'易过早 all-in"
    source: "东方财富《量子科技深度报告》/ 澎湃《量子计算的 2026》/ BCG"
    fit_notes: ""

  - name: "机器人与高端装备"
    why_hot: "具身智能 + 制造业升级 + 劳动力替代；2026 人形机器人进入商业化元年、10 万级量产"
    value_is_in: "上游核心零部件壁垒最深 —— 灵巧手（占整机成本 17%、价值量最高）、减速器（谐波/行星/RV）、执行器、感知决策与具身智能算法"
    trap: "本体 = 组装厂，门槛低、同质化；只做整机集成而无核心零部件壁垒"
    source: "《2026 具身智能产业发展研究》/ 中国工业新闻网（一级市场共识）/ 国金证券"
    fit_notes: ""

  - name: "航空航天与商业航天"
    why_hot: "2026 从'技术验证'迈向'规模化量产'拐点；卫星互联网 + 可复用火箭密集验证窗口"
    value_is_in: "高壁垒硬环节 —— 火箭发动机 / 箭体结构、可回收复用技术、卫星载荷 / 天线 / 激光通信、低轨通信卫星链（最先有基本面）"
    trap: "低成本批产与火箭复用技术尚未成熟；停留在发射服务/组装环节，或讲无收入的应用故事"
    source: "中信证券 / 上海证券报 2026-04 / 中证网"
    fit_notes: ""

  - name: "公共卫生与 AI 医学"
    why_hot: "NMPA 三类证审批成熟（4-8 个月）、2026 获批数同比 +50%，行业进入合规化商业化阶段"
    value_is_in: "NMPA 三类证（核心护城河）+ 临床验证与落地 + 数据合规体系 + 医生工作流嵌入"
    trap: "只会做模型/算法、卡在证照与数据合规之外，无法进入临床商业化（医疗 AI 属高风险，合规即生死线）"
    source: "《中国 AI 医疗八大趋势》/ NMPA 公告 / 安全内参"
    fit_notes: ""

  - name: "材料科学"
    why_hot: "AI + 高通量计算带来材料发现的'GPT 时刻'；卡脖子环节集中在最上游材料与设备"
    value_is_in: "AI + 高通量计算驱动的材料基因工程（研发-生产-应用全链）、最上游卡脖子材料与设备、化合物半导体 IDM"
    trap: "停在实验室成果不能量产转化；或停留在传统试错/慢节奏第一性原理研发路径"
    source: "36 氪《AI+新材料的 GPT 时刻》/ 中国工程院《材料基因工程》/ 钛媒体"
    fit_notes: ""
